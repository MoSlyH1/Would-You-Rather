<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Would You Rather - Lebanese edition. A fun choice game.">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#12060A">

  <title>Would You Rather</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #12060A; }
    #loader {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(#3A0A17, #12060A); color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
    }
    #loader .title { font-size: 26px; font-weight: 800; }
    #loader .title b { color: #D7263D; }
    #loader .spin {
      margin-top: 18px; width: 34px; height: 34px;
      border: 3px solid rgba(255,255,255,0.18);
      border-top-color: #D7263D; border-radius: 50%;
      animation: r 0.9s linear infinite;
    }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loader">
    <div class="title">Would You <b>Rather</b></div>
    <div class="spin"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var l = document.getElementById('loader');
      if (l) l.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
